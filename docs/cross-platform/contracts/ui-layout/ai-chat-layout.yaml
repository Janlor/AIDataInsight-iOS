version: 0.1.0
feature: ai-chat
sourceState: docs/cross-platform/contracts/ui-state/ai-chat-state.yaml

layoutIntent:
  screenRole: aiHomeChatSurface
  presentation: primaryConversation
  background: moduleImageBackground
  contentStyle: chatTranscriptWithComposer

background:
  assetSemantic: background_vc
  rules:
    - AI Chat uses the module-specific background image when the asset exists.
    - Background extends behind system bars; content avoids safe area through the AI Home shell.
    - Do not replace the image background with the grouped gradient used by Setting/History.

navigation:
  ownedBy: ai-home-shell
  title: "AI数据分析助手"
  leadingAction:
    semantic: openHistory
  trailingAction:
    semantic: startNewConversation
  rules:
    - AIChat content surface does not duplicate the shell title when embedded in AI Home.
    - Standalone/debug rendering may show the title for inspection only.

transcript:
  scrollBehavior:
    - Message list fills available space above composer.
    - Sending, receiving stream chunks, loading history, or replacing thinking message scrolls to bottom unless the user is actively dragging.
    - After a chart message is generated, scroll to the transcript bottom anchor so the newly rendered chart and feedback area can be inspected without a manual extra swipe.
  welcome:
    kind: assistantBubble
    introText: "你好，我是你的AI数据分析助手。我能根据业绩、库存、代采、应收、帐龄等领域的问题生成相应的智能图表。"
    promptText: "你也可以尝试点击以下推荐问题："
    exampleIntro: "我能精准识别问题中的指标名称、时间范围、分组维度和过滤条件，例如："
    exampleSegments:
      - top: "今年第一季度"
        bottom: "时间范围"
      - top: "销售额"
        bottom: "指标名称"
      - top: "大于5000万"
        bottom: "过滤条件"
      - top: "的"
        bottom: ""
      - top: "公司。"
        bottom: "分组维度"
    questionRows:
      action: sendMessage(question)
      style: accentTextWithDividers
  assistantMessage:
    alignment: leading
    shape: leadingChatBubble
    background: secondaryGroupedBackground
    border: separator
  userMessage:
    alignment: trailing
    shape: trailingChatBubble
    background: lightBlueGradient
  chartMessage:
    alignment: leading
    title: "根据您的查询，以下是分析结果:"
    fallback: "数据分析还在测试阶段，很快就能上线，敬请期待！"
    chart:
      unitPrefix: "单位："
      valueScale: tenThousand
      maxVisibleGroups: 7
      style: barOrStackedBar
      legend:
        showWhen: labelsAvailable
        placement: belowChartOrAboveSelection
      rules:
        - chartCommonVoList renders as single-value bars.
        - accountAgeGroupVoList renders as stacked bars with labels as stack legend.
        - Target platforms may use native chart libraries or lightweight custom drawing, but must consume ChartPayload instead of raw API JSON.
        - If chart payload is empty, show the contract fallback text instead of raw JSON.
    feedback:
      placement: belowChartBubbleTrailing
      actions:
        like:
          requestValue: "1"
        dislike:
          requestValue: "0"
      rules:
        - Feedback is shown only for chart messages with historyDetailId.
        - Like and dislike are mutually exclusive.
        - Tapping an already selected feedback action is ignored.
        - On request failure, revert to the previous feedback state and show a lightweight error.
        - iOS named assets loaded through UIImage.imageNamed are cross-platform asset candidates and should be copied or exported for target platforms when possible.
        - SF Symbols loaded through UIImage(systemName:) are iOS platform decorations; Android/Web may use native equivalents or omit them.
        - If a named asset cannot be consumed directly by the target platform, ask the human to export it and place it under the target feature asset directory.

composer:
  placement: bottom
  shape: capsule
  background: secondaryGroupedBackground
  border: separator
  placeholder: "请输入您的数据分析查询。"
  minHeight: 42
  maxInputLines: 5
  sendAction:
    semantic: send
    enabledWhen: canSend
  rules:
    - Pressing return/enter may send when the target platform supports it.
    - Composer stays above keyboard/IME.
    - Sending clears the input.
    - While AI is thinking/streaming, send is disabled and visually muted.

iconRules:
  - UIImage(systemName:) / SF Symbols are iOS platform decorations; Android/Web use a native/icon-library equivalent only when clearly available, otherwise omit the icon.
  - UIImage.imageNamed assets are bundled product assets; target platforms should copy or export them into the corresponding feature asset directory when possible.
  - If a named asset cannot be reused directly, stop and ask the human to provide an exported PNG/SVG/WebP at the target path instead of replacing it with a fake text icon.
