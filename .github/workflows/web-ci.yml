name: Web CI

on:
  push:
    paths:
      - 'app-web/**'
      - 'docs/cross-platform/contracts/**'
      - 'docs/architecture/web-implementation-plan.md'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'app-web/**'
      - 'docs/cross-platform/contracts/**'
      - 'docs/architecture/web-implementation-plan.md'
      - '.github/workflows/web-ci.yml'

jobs:
  web:
    name: Web quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: E2E tests
        run: pnpm e2e
