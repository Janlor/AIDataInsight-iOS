name: Web CI

on:
  push:
    paths:
      - 'app-web/**'
      - 'docs/cross-platform/contracts/**'
      - 'docs/architecture/web-implementation-plan.md'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'app-web/**'
      - 'docs/cross-platform/contracts/**'
      - 'docs/architecture/web-implementation-plan.md'
      - '.github/workflows/web-ci.yml'

jobs:
  web:
    name: Web quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps --only-shell chromium

      - name: E2E tests
        run: npm run e2e
